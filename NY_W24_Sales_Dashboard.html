  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {

    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);

  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-title { display: flex; align-items: baseline; gap: 14px; }
  .header-title h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .header-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    background: var(--accent); color: #fff; padding: 3px 9px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .header-meta { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  .store-nav {
    padding: 14px 40px 0; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 4px; overflow-x: auto;
  }
  .store-nav::-webkit-scrollbar { height: 3px; }
  .store-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tab-btn {
    padding: 10px 18px; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s ease;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
  .tab-chg { font-family: 'DM Mono', monospace; font-size: 10px; margin-left: 5px; }
  .tab-btn.active .tab-chg.pos { color: var(--up); }
  .tab-btn.active .tab-chg.neg { color: var(--down); }

  main { padding: 28px 40px; max-width: 1400px; margin: 0 auto; }

  .summary-strip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 24px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
  }
  .strip-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .strip-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
  .strip-val.up { color: var(--up); }
  .strip-val.down { color: var(--down); }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .kpi-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }

  .kpi-sub { margin-top: 6px; font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .kpi-delta { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; margin-top: 4px; }
  .kpi-delta.up { color: var(--up); }
  .kpi-delta.down { color: var(--down); }

  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .section-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; }
  .section-hint { font-size: 11px; color: var(--text-muted); }

  .cat-row { margin-bottom: 13px; }
  .cat-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .cat-name { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .cat-pcts { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
  .cat-pct-26 { color: var(--accent); }
  .cat-delta-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }

  .cat-delta-badge.down { background: rgba(239,68,68,0.12); color: var(--down); }
  .cat-delta-badge.neutral { background: rgba(100,116,139,0.12); color: var(--neutral); }

  .bar-25 { position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px; background: rgba(100,116,139,0.4); }
  .bar-26 { position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px; background: var(--accent); opacity: 0.85; }

  .top50-table thead th {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.6px; text-transform: uppercase;

  .td-name .name-eng { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .td-cat { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

function fmtAmt(v) {
  if(v===undefined||v===null) return '-';
  return '$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtChg(v) {
  if(v===undefined||v===null) return '-';
  const s = v>=0?'+':'-';
  return s+'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtPct(v) {
  if(v===undefined||v===null) return '-';
  const s = v>=0?'+':'';
  return s+v.toFixed(1)+'%';
}
function pillClass(cat) {
  return CAT_PILL_CLASS[cat]||'pill-기타';
}

let currentStore = 'ALL';

function showStore(br) {
  currentStore = br;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+br).classList.add('active');
  renderContent();
}

function computeRegion() {
  const cats = {};
  let t26=0,t25=0,qty26=0,qty25=0;
  const items = {};
  
  Object.values(DATA).forEach(s => {
    t26+=s.total26; t25+=s.total25;
    s.categories.forEach(c=>{
      if(!cats[c.cat])cats[c.cat]={cat:c.cat,amt26:0,amt25:0};
      cats[c.cat].amt26+=c.amt26; cats[c.cat].amt25+=c.amt25;
    });
    s.top50.forEach(item=>{
      if(!items[item.code])items[item.code]={...item,amt26:0,amt25:0};
      items[item.code].amt26+=item.amt26; items[item.code].amt25+=item.amt25;
    });
  });
  
  const catArr = Object.values(cats).map(c=>{
    const pct26 = t26>0?+(c.amt26/t26*100).toFixed(1):0;
    const pct25 = t25>0?+(c.amt25/t25*100).toFixed(1):0;
    return {...c,pct26,pct25,pct_chg:+(pct26-pct25).toFixed(1)};
  }).sort((a,b)=>b.amt26-a.amt26);
  
  const itemArr = Object.values(items).map(i=>{
    return {...i,chg:+(i.amt26-i.amt25).toFixed(2),chg_pct:i.amt25>0?+((i.amt26-i.amt25)/i.amt25*100).toFixed(1):100};
  }).sort((a,b)=>b.amt26-a.amt26).slice(0,50);
  
  return {total26:t26,total25:t25,total_chg:t26-t25,total_chg_pct:t25>0?+((t26-t25)/t25*100).toFixed(1):0,categories:catArr,top50:itemArr};
}

        <thead><tr>
          <th>#</th><th>매장</th>
          <th class="right">2026</th><th class="right">2025</th>
          <th class="right">증감</th><th class="right">YoY%</th>
        </tr></thead>
        <tbody>`;
    
    const stores = Object.entries(DATA).sort((a,b)=>b[1].total26-a[1].total26);
    stores.forEach(([br, s], i)=>{
      const dir = s.total_chg>=0?'up':'down';
      html += `<tr>
        <td class="td-rank">${i+1}</td>
        <td><strong>${br}</strong></td>
        <td class="td-amt">${fmtAmt(s.total26)}</td>
        <td class="td-amt" style="color:var(--text-muted)">${fmtAmt(s.total25)}</td>
        <td class="td-chg ${dir}">${fmtChg(s.total_chg)}</td>
        <td class="td-chg-pct ${dir}">${fmtPct(s.total_chg_pct)}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  } else {
    // For individual store, show second category detail card
    html += `<div class="section-card">
      <div class="section-header">
        <span class="section-title">💰 카테고리 매출 상세</span>
        <span class="section-hint">금액 기준</span>
      </div>
      <div class="table-scroll">
      <table class="top50-table">
        <thead><tr>
          <th>카테고리</th>
          <th class="right">2026</th><th class="right">2025</th><th class="right">증감</th>
        </tr></thead>
        <tbody>`;
    d.categories.filter(c=>c.amt26>0).forEach(c=>{
      const chg = c.amt26-c.amt25;
      const dir = chg>=0?'up':'down';
      html += `<tr>
        <td><span class="cat-pill ${pillClass(c.cat)}">${c.cat}</span></td>
        <td class="td-amt">${fmtAmt(c.amt26)}</td>
        <td class="td-amt" style="color:var(--text-muted)">${fmtAmt(c.amt25)}</td>
        <td class="td-chg ${dir}">${fmtChg(chg)}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  }

  html += '</div>'; // end section-grid

  // Top 50 table
  html += `<div class="section-grid">
  <div class="section-card full-card">
    <div class="section-header">
      <span class="section-title">🏆 Top 50 아이템 — ${storeLabel}</span>
      <span class="section-hint">2026 매출 기준</span>
    </div>
    <div class="table-scroll top50-wrap">
    <table class="top50-table">
      <thead><tr>
        <th class="right">#</th>
        <th>품목명</th><th>카테고리</th>
        <th class="right">2026 매출</th><th class="right">2025 매출</th>
        <th class="right">증감</th><th class="right">YoY%</th>
      </tr></thead>
      <tbody>`;
  
  d.top50.filter(item=>item.amt26>0).forEach((item,i)=>{
    const dir = item.chg>=0?'up':'down';
    const pctDir = item.chg_pct>=0?'up':(item.chg_pct<-200?'neutral':'down');
    const krName = item.kr&&item.kr!=='nan'?item.kr:(item.eng||'');
    const engName = item.eng&&item.eng!=='nan'?item.eng:'';
    html += `<tr>
      <td class="td-rank">${i+1}</td>
      <td class="td-name">
        <div class="name-kr">${krName}</div>
        ${engName?`<div class="name-eng">${engName}</div>`:''}
      </td>
      <td class="td-cat"><span class="cat-pill ${pillClass(item.cat)}">${item.cat}</span></td>
      <td class="td-amt">${fmtAmt(item.amt26)}</td>
      <td class="td-amt" style="color:var(--text-muted)">${fmtAmt(item.amt25)}</td>
      <td class="td-chg ${dir}">${fmtChg(item.chg)}</td>
      <td class="td-chg-pct ${pctDir}">${item.amt25>0?fmtPct(item.chg_pct):'NEW'}</td>
    </tr>`;
  });
  
  html += '</tbody></table></div></div></div>';

  document.getElementById('mainContent').innerHTML = `
    <div class="summary-strip">
      <div><div class="strip-label">${storeLabel} 매출 (2026)</div><div class="strip-val">${fmtAmt(d.total26)}</div></div>
      <div><div class="strip-label">전년 동기 (2025)</div><div class="strip-val">${fmtAmt(d.total25)}</div></div>
      <div><div class="strip-label">YoY 증감</div><div class="strip-val ${chgDir}">${chgSign}${fmtAmt(d.total_chg)}</div></div>
      <div><div class="strip-label">성장률</div><div class="strip-val ${chgDir}">${chgSign}${chgPct}%</div></div>
    </div>
  `+html;
}

// Initial render
renderContent();
</script>
</body>
</html>
